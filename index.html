<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sims4AndroidBR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">Sims4AndroidBR</div>
  <button class="btn">Guia</button>
</header>

<main>

  <section class="hero">
  <div class="hero-text">
    <h1>Guia Completo</h1>
    <p>Rode The Sims 4 no android + mods! Passo a passo :3</p>
    <button class="primary" id="btn-comecar">Começar</button>
  </div>
</section>

  <div class="divisor" id="meu-divisor" style="display: none;"></div>

  <section class="grid">
    
    <div class="card">
      <img src="img/download-icon.png" class="card-icon">
      <h3>Download</h3>
      <p>Baixar jogo + apps necessários</p>
    </div>

    <div class="card">
      <img src="img/instalacao-icon.png" class="card-icon">
      <h3>Instalação</h3>
      <p>Configurar GameHub corretamente</p>
    </div>

    <div class="card">
      <img src="img/mods-icon.png" class="card-icon">
      <h3>Mods</h3>
      <p>Como instalar WickedWhims e CC</p>
    </div>

    <div class="card">
      <h3>Problemas</h3>
      <img src="img/problemas-icon.png" class="card-icon">
      <p>Corrigir bugs comuns</p>
    </div>

  </section>

</main>

  <script>
  const btn = document.getElementById('btn-comecar');
  const cards = document.getElementById('guia-cards');
  const divisor = document.getElementById('meu-divisor');

  btn.addEventListener('click', () => {
    
    cards.style.display = 'grid';
    divisor.style.display = 'block';

    cards.classList.add('efeito-entrada');
    divisor.classList.add('efeito-entrada');
    
    setTimeout(() => {
      cards.scrollIntoView({ behavior: 'smooth' });
    }, 50);
    
    btn.style.transition = '0.5s';
    btn.style.opacity = '0';
    setTimeout(() => { btn.style.display = 'none'; }, 500);
  });
  </script>

</body>
</html>
